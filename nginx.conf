gzip on;
gzip_types text/html text/css application/javascript application/json;
gzip_min_length 1024;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # dashboard.yaml: served from the mounted data/ folder, no cache
    location = /dashboard.yaml {
        add_header Cache-Control "no-cache";
        try_files /data/dashboard.yaml =404;
    }

    # Runtime config: never cache so the version is always fresh
    location = /config.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed JS/CSS assets: immutable cache for one year
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # SPA routing: fall back to index.html for all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
