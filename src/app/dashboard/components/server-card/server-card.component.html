@if (expanded()) {
  <!-- Desktop: full panel -->
  <article class="panel animate-in">
    <div class="panel__head">
      <div class="head-left">
        <span class="server-name">{{ server().name }}</span>
        <span class="server-meta">{{ server().host }} · {{ server().location }}</span>
      </div>
      <app-health-bar [active]="activeCount()" [total]="totalCount()" />
    </div>

    <div class="panel__body">
      @for (category of server().categories; track category.id; let i = $index) {
        <app-category-section
          [category]="category"
          [compact]="true"
          [collapsible]="true"
          [defaultExpanded]="i === 0"
        />
      }
    </div>
  </article>
} @else {
  <!-- Mobile: clickable row -->
  <button type="button" class="row animate-in" (click)="selected.emit(server())">
    <span class="chevron" aria-hidden="true">›</span>
    <div class="row__info">
      <span class="server-name">{{ server().name }}</span>
      <span class="server-meta">{{ server().host }} · {{ server().location }}</span>
    </div>
    <app-health-bar [active]="activeCount()" [total]="totalCount()" />
  </button>
}
