<div class="detail animate-in">
  <button type="button" class="back-btn" (click)="back.emit()">
    <span aria-hidden="true">←</span>
    <span>back</span>
  </button>

  <div class="summary">
    <div class="summary__row">
      <span class="server-name">{{ server().name }}</span>
      <app-health-bar [active]="activeCount()" [total]="totalCount()" />
    </div>
    <p class="server-meta">{{ server().host }} · {{ server().location }}</p>
  </div>

  <div class="categories">
    @for (category of server().categories; track category.id) {
      <app-category-section [category]="category" />
    }
  </div>
</div>
