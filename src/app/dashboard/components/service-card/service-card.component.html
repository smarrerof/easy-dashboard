@if (compact()) {
  <a
    [href]="fullUrl()"
    target="_blank"
    rel="noopener noreferrer"
    [title]="service().description"
    class="row"
    [class.row--inactive]="service().status === 'inactive'"
  >
    <span
      class="dot"
      [class.dot-active]="service().status === 'active'"
      [class.dot-inactive]="service().status === 'inactive'"
      aria-hidden="true">●</span>
    <span class="name">{{ service().name }}</span>
    <span class="port">:{{ service().port }}</span>
  </a>
} @else {
  <a
    [href]="fullUrl()"
    target="_blank"
    rel="noopener noreferrer"
    class="card"
    [class.card--inactive]="service().status === 'inactive'"
  >
    <div class="card__head">
      <span
        class="dot"
        [class.dot-active]="service().status === 'active'"
        [class.dot-inactive]="service().status === 'inactive'"
        aria-hidden="true">●</span>
      <span class="name">{{ service().name }}</span>
      <span class="port">:{{ service().port }}</span>
    </div>
    <p class="description">{{ service().description }}</p>
  </a>
}
