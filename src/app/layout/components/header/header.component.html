<header>
  <div class="inner">
    <div class="brand">
      <span class="prompt-mark" aria-hidden="true">▶</span>
      <span class="title">easy-dashboard</span>
    </div>

    <button
      type="button"
      class="theme-btn"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      @if (themeService.theme() === 'dark') {
        <span>[light]</span>
      } @else {
        <span>[dark]</span>
      }
    </button>
  </div>
</header>
